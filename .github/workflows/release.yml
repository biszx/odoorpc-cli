name: Release OdooRPC CLI

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --name odoorpc_cli odoorpc_cli/cli.py

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Install Inno Setup (chocolatey)
        run: choco install innosetup -y

      - name: Build installer with Inno Setup
        run: |
          echo Building installer using Inno Setup
          if ($env:VERSION) { $v = $env:VERSION } else { $v = '0.0.0' }
          Write-Host "ISCC command: C:\Program Files (x86)\Inno Setup 6\ISCC.exe -DMyAppVersion=$v packaging\\windows\\odoorpc_cli.iss"
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' -DMyAppVersion=$v 'packaging\\windows\\odoorpc_cli.iss'
      - name: Prepare release installer
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $v = $env:VERSION
          if (-not $v) { $v = '0.0.0' }
          New-Item -ItemType Directory -Force -Path release_artifacts
          $installer = Get-ChildItem -Path Output*, dist -Recurse -Filter *.exe | Select-Object -First 1
          if ($null -eq $installer) { Write-Error "Installer not found"; exit 1 }
          Copy-Item $installer.FullName -Destination (Join-Path $PWD "release_artifacts\odoorpc-cli-setup-$v.exe")

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-artifacts
          path: |
            dist/
            Output*

      - name: Upload release installer artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: release-installers
          path: release_artifacts/*

  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution
        run: python -m build

      - name: Upload PyPI dists for Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: pypi-dists
          path: dist/

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*

  create-release:
    runs-on: ubuntu-latest
    needs: build-windows-installer
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v8
        with:
          name: release-installers
          path: release_artifacts

      - name: Find downloaded release installer
        id: find_installer
        run: |
          set -e
          installer=$(find release_artifacts -type f -name "odoorpc-cli-setup-${GITHUB_REF_NAME}.exe" | head -n 1)
          if [ -z "$installer" ]; then
            echo "Installer file not found in release_artifacts"
            find release_artifacts -type f | sed 's#^#FOUND: #'
            exit 1
          fi
          echo "installer_path=$installer" >> $GITHUB_OUTPUT

      - name: Checkout repository (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect last tag
        id: detect_tag
        run: |
          NUM_TAGS=$(git ls-remote --tags origin | wc -l | tr -d ' \n')
          if [ "$NUM_TAGS" -ge 2 ]; then
            # Get the commit for the second-most-recent tag and describe it to obtain the tag name
            PREV_TAG=$(git describe --tags --abbrev=0 $(git rev-list --tags --max-count=2 | tail -n1) 2>/dev/null || echo "")
          else
            PREV_TAG=""
          fi
          echo "last_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Set up Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI to generate release notes
        id: run_copilot
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          LAST_TAG: ${{ steps.detect_tag.outputs.last_tag }}
        run: |
          set -e
          mkdir -p release_artifacts
          RANGE="${LAST_TAG}..${GITHUB_REF_NAME}"
          if [ -z "$LAST_TAG" ]; then RANGE="HEAD"; fi
          copilot -p "You are a strict release-notes generator. Use ONLY the commit messages and code diffs in the git range ${RANGE} to produce release notes. Use the template file at docs/release-notes/TEMPLATE.md exactly: replace {{VERSION}} with ${GITHUB_REF_NAME}, and fill {{SUMMARY}}, {{ADDED}}, {{CHANGED}}, {{FIXED}} using only commit messages and code diffs. Do NOT hallucinate, infer, or add context beyond the commits and diffs. Output MUST be valid Markdown and match the template structure exactly. For each bullet use: '- <commit message> (<author>) - <commit url>'. Omit empty sections. Write the output exactly to release_artifacts/copilot_release_notes.md" --model gpt-5-mini --allow-tool='shell(git:*)' --allow-tool=read --allow-tool=write --no-ask-user

      - name: Read Copilot-generated notes
        id: copilot_read
        run: |
          if [ -f release_artifacts/copilot_release_notes.md ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            cat release_artifacts/copilot_release_notes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "notes=" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release (with generated notes)
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: ${{ steps.copilot_read.outputs.notes }}
          draft: false
          prerelease: false

      - name: Upload release installer asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_installer.outputs.installer_path }}
          asset_name: odoorpc-cli-setup-${{ github.ref_name }}.exe
          asset_content_type: application/octet-stream
